name: Daily Portfolio Update

on:
  schedule:
    # UTC 23:00 Mon–Fri = KST 08:00 (after US market close)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect stock prices & exchange rate
        id: collect_prices
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set +e
          LOG=$(python scripts/collect_prices.py 2>&1)
          EXIT=$?
          echo "$LOG"
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "${LOG:0:2000}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT

      - name: Calculate portfolio metrics
        id: calc_metrics
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set +e
          LOG=$(python scripts/calculate_metrics.py 2>&1)
          EXIT=$?
          echo "$LOG"
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "${LOG:0:2000}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT

      - name: Collect news
        id: collect_news
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set +e
          LOG=$(python scripts/collect_news.py 2>&1)
          EXIT=$?
          echo "$LOG"
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "${LOG:0:2000}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT

      - name: Generate dashboard data
        id: gen_dashboard
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set +e
          LOG=$(python scripts/generate_dashboard.py 2>&1)
          EXIT=$?
          echo "$LOG"
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "${LOG:0:2000}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT

      - name: Log run results to Google Sheets
        if: always()
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          STEP_COLLECT_PRICES: ${{ steps.collect_prices.outcome }}
          STEP_CALC_METRICS:   ${{ steps.calc_metrics.outcome }}
          STEP_COLLECT_NEWS:   ${{ steps.collect_news.outcome }}
          STEP_GEN_DASHBOARD:  ${{ steps.gen_dashboard.outcome }}
          STEP_COLLECT_PRICES_LOG: ${{ steps.collect_prices.outputs.log }}
          STEP_CALC_METRICS_LOG:   ${{ steps.calc_metrics.outputs.log }}
          STEP_COLLECT_NEWS_LOG:   ${{ steps.collect_news.outputs.log }}
          STEP_GEN_DASHBOARD_LOG:  ${{ steps.gen_dashboard.outputs.log }}
          GH_RUN_ID:  ${{ github.run_id }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/log_run.py

      - name: Commit updated dashboard data
        if: steps.gen_dashboard.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/dashboard_data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest (after update job commit)
        run: git pull origin ${{ github.ref_name }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
